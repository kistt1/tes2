<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Team - Cookies Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --orange:#FF6B00;
      --orange-light:#FF8C33;
      --orange-dark:#CC5500;
      --orange-glow:rgba(255,107,0,0.1);
      --dark:#1A0E00;
      --dark2:#2D1A00;
      --dark3:#3D2600;
      --text:#FFF3E6;
      --text-muted:#FFCB8C;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:linear-gradient(180deg,#1A0E00 0%,#2D1A00 60%,#3D2600 100%);
      background-attachment:fixed;
      color:var(--text);font-family:'Nunito',sans-serif;overflow-x:hidden;
    }
    /* Global animated pixel grid — covers entire page */
    body::before{
      content:'';
      position:fixed;inset:0;z-index:0;
      background-image:
        linear-gradient(rgba(255,107,0,0.05) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,107,0,0.05) 1px,transparent 1px);
      background-size:32px 32px;
      animation:gridDrift 20s linear infinite;
      pointer-events:none;
    }

    /* NAV */
    nav{
      position:fixed;top:0;left:0;right:0;z-index:1000;
      background:rgba(26,14,0,0.98);
      border-bottom:3px solid var(--orange-dark);
      padding:1rem 5%;
      display:flex;align-items:center;justify-content:space-between;
    }
    .nav-logo{font-family:'Press Start 2P',monospace;color:var(--orange);display:flex;align-items:center;gap:12px;font-size:15px;text-shadow:0 0 12px rgba(255,107,0,0.5);}
    .nav-logo img{height:38px}
    .nav-links{display:flex;gap:2.2rem}
    .nav-links a{color:var(--text-muted);text-decoration:none;font-weight:700;font-size:14px;transition:color 0.2s;}
    .nav-links a:hover{color:var(--orange);}

    /* ── HERO ── */
    .staff-hero{
      padding-top:0;
      min-height:55vh;
      background:transparent;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;
      padding:6rem 2rem 4rem;
      position:relative;overflow:hidden;
    }

    /* Radial glow blobs — same as index hero::before */
    .staff-hero::before{
      content:'';position:absolute;inset:0;
      background-image:
        radial-gradient(circle at 20% 30%,rgba(255,107,0,0.10) 0%,transparent 50%),
        radial-gradient(circle at 80% 70%,rgba(255,140,51,0.08) 0%,transparent 50%),
        radial-gradient(circle at 55% 55%,rgba(255,107,0,0.06) 0%,transparent 40%);
      pointer-events:none;
    }

    /* Animated pixel grid — now handled by body::before globally */
    @keyframes gridDrift{
      0%{background-position:0 0}
      100%{background-position:32px 32px}
    }

    /* Floating embers — full page */
    .embers{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1;}
    .ember{
      position:absolute;
      width:3px;height:3px;
      background:var(--orange);
      border-radius:50%;
      opacity:0;
      animation:floatUp var(--dur,6s) ease-in var(--delay,0s) infinite;
    }
    @keyframes floatUp{
      0%  {opacity:0;transform:translateY(0) scale(1);}
      15% {opacity:0.8;}
      80% {opacity:0.3;}
      100%{opacity:0;transform:translateY(-120px) scale(0.3);}
    }

    .staff-title{
      font-family:'Press Start 2P',monospace;
      font-size:clamp(36px,6vw,58px);
      color:var(--orange);
      text-shadow:0 0 40px rgba(255,107,0,0.6),0 4px 0 #7a3300;
      position:relative;z-index:1;
      animation:titlePulse 3s ease-in-out infinite;
    }
    @keyframes titlePulse{
      0%,100%{text-shadow:0 0 40px rgba(255,107,0,0.6),0 4px 0 #7a3300;}
      50%    {text-shadow:0 0 70px rgba(255,107,0,0.9),0 4px 0 #7a3300;}
    }

    .hero-badge{
      background:rgba(255,107,0,0.12);border:1px solid var(--orange-dark);
      color:var(--orange-light);font-size:11px;font-weight:700;letter-spacing:2px;
      padding:6px 16px;border-radius:4px;margin-bottom:1.5rem;
      text-transform:uppercase;position:relative;z-index:2;
    }

    /* ── STAFF SECTION ── */
    .staff-section{
      background:transparent;
      padding:60px 5% 100px;
      position:relative;
      overflow:hidden;
    }
    .staff-section::before{
      content:'';position:absolute;inset:0;
      background-image:
        radial-gradient(circle at 15% 20%,rgba(255,107,0,0.10) 0%,transparent 50%),
        radial-gradient(circle at 85% 80%,rgba(255,140,51,0.08) 0%,transparent 50%),
        radial-gradient(circle at 50% 50%,rgba(255,107,0,0.06) 0%,transparent 40%);
      pointer-events:none;
    }

    .staff-grid{
      max-width:1400px;
      margin:0 auto;
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(320px,1fr));
      gap:35px;
      position:relative;
      z-index:1;
    }

    /* Cards — scroll reveal */
    .staff-card{
      background:var(--dark);
      border:2px solid var(--orange-dark);
      border-radius:16px;
      overflow:hidden;
      opacity:0;
      transform:translateY(30px);
      transition:opacity 0.6s ease, transform 0.6s ease, border-color 0.3s, box-shadow 0.3s;
    }
    .staff-card.visible{
      opacity:1;
      transform:translateY(0);
    }
    .staff-card:hover{
      transform:translateY(-12px) !important;
      border-color:var(--orange);
      box-shadow:0 20px 40px rgba(255,107,0,0.28);
    }

    .staff-card img{
      width:100%;
      height:340px;
      object-fit:cover;
      transition:transform 0.5s ease;
    }
    .staff-card:hover img{
      transform:scale(1.04);
    }

    .staff-name{
      background:var(--orange);
      color:#000;
      font-size:1.65rem;
      font-weight:800;
      padding:14px 0;
      text-align:center;
    }

    .staff-info{
      padding:20px 25px 30px;
      text-align:center;
    }

    .staff-role{
      display:inline-block;
      padding:8px 26px;
      border-radius:30px;
      font-weight:800;
      font-size:14px;
      margin:12px 0;
      letter-spacing:1px;
      position:relative;
      overflow:hidden;
    }
    .staff-role::after{
      content:'';
      position:absolute;inset:0;
      background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.15) 50%,transparent 100%);
      transform:translateX(-100%);
      animation:shimmer 2.5s ease-in-out infinite;
    }
    @keyframes shimmer{
      0%  {transform:translateX(-100%)}
      60%,100%{transform:translateX(100%)}
    }
    .owner {background:#FF3333; color:white;}
    .admin {background:#FF8800; color:white;}
    .mod   {background:#00CC66; color:white;}
    .helper{background:#4488FF; color:white;}
    .builder{background:#AA77FF;color:white;}

    .mc-name{
      font-family:'Press Start 2P',monospace;
      background:rgba(0,0,0,0.6);
      padding:8px 22px;
      border-radius:30px;
      font-size:0.95rem;
      color:var(--text-muted);
    }

    /* ── CUSTOM CURSOR ── */
    *{cursor:none!important}
    #cur-dot{
      position:fixed;top:0;left:0;z-index:99999;pointer-events:none;
      width:12px;height:12px;
      background:#FF6B00;
      border-radius:50%;
      transform:translate(-50%,-50%);
      box-shadow:0 0 10px 3px rgba(255,107,0,0.7);
      transition:transform 0.08s ease,width 0.15s ease,height 0.15s ease,background 0.15s ease;
    }
    #cur-ring{
      position:fixed;top:0;left:0;z-index:99998;pointer-events:none;
      width:32px;height:32px;
      border:2px solid rgba(255,107,0,0.6);
      border-radius:50%;
      transform:translate(-50%,-50%);
      transition:width 0.2s ease,height 0.2s ease,border-color 0.2s ease;
    }
    .cur-trail{
      position:fixed;top:0;left:0;z-index:99997;pointer-events:none;
      border-radius:50%;
      transform:translate(-50%,-50%);
      opacity:0;
      animation:trailFade 0.5s ease forwards;
    }
    @keyframes trailFade{
      0%  {opacity:0.7;transform:translate(-50%,-50%) scale(1);}
      100%{opacity:0;  transform:translate(-50%,-50%) scale(0.2);}
    }

    /* Stagger delays for cards */
    .staff-card:nth-child(1){transition-delay:0.05s}
    .staff-card:nth-child(2){transition-delay:0.15s}
    .staff-card:nth-child(3){transition-delay:0.25s}
    .staff-card:nth-child(4){transition-delay:0.35s}
    .staff-card:nth-child(5){transition-delay:0.45s}
  </style>
</head>
<body>

<!-- CUSTOM CURSOR -->
<div id="cur-dot"></div>
<div id="cur-ring"></div>

  <!-- NAV -->
  <nav>
    <div class="nav-logo">
      <img src="logo.png" alt="Cookies Network"> COOKIES NETWORK
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="index.html#fitur">Fitur</a>
      <a href="index.html#toko">Toko</a>
      <a href="index.html#discord">Discord</a>
      <a href="staff.html" style="color:#FF6B00; font-weight:bold;">👥 Staff</a>
    </div>
  </nav>

  <!-- HERO -->
  <div class="embers" id="embers"></div>

  <section class="staff-hero">
    <div class="hero-badge">👥 Tim di Balik Server</div>
    <h1 class="staff-title">STAFF TEAM</h1>
  </section>

  <!-- STAFF SECTION -->
  <div class="staff-section">
    <div class="staff-grid">

      <div class="staff-card">
        <img src="img/mal.png" alt="Founder">
        <div class="staff-name">Malkistt </div>
        <div class="staff-info">
          <div class="staff-role owner">FOUNDER</div>
          <div class="mc-name">Malkistt | Lqnnn</div>
        </div>
      </div>

      <div class="staff-card">
        <img src="img/zdf.jpg" alt="OWNER">
        <div class="staff-name">zdfbhiu</div>
        <div class="staff-info">
          <div class="staff-role admin">OWNEr</div>
          <div class="mc-name">zdfbhiu</div>
        </div>
      </div>

      <div class="staff-card">
        <img src="img/sdf.png" alt="OWNER">
        <div class="staff-name">sdfbhiu</div>
        <div class="staff-info">
          <div class="staff-role mod">OWNER</div>
          <div class="mc-name">zdfbhiu</div>
        </div>
      </div>

      <div class="staff-card">
        <img src="img/helper.png" alt="Helper">
        <div class="staff-name">Nama Helper</div>
        <div class="staff-info">
          <div class="staff-role helper">HELPER</div>
          <div class="mc-name">helper_mcname</div>
        </div>
      </div>

      <div class="staff-card">
        <img src="img/builder.jpg" alt="Builder">
        <div class="staff-name">Nama Builder</div>
        <div class="staff-info">
          <div class="staff-role builder">BUILDER</div>
          <div class="mc-name">builder_mcname</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    /* ── FLOATING EMBERS ── */
    const container = document.getElementById('embers');
    for(let i = 0; i < 28; i++){
      const e = document.createElement('div');
      e.className = 'ember';
      e.style.setProperty('--dur',  (4 + Math.random()*6)+'s');
      e.style.setProperty('--delay',(Math.random()*6)+'s');
      e.style.left  = (Math.random()*100)+'%';
      e.style.bottom= (Math.random()*30)+'%';
      // vary size & colour slightly
      const sz = 2+Math.random()*3;
      e.style.width  = sz+'px';
      e.style.height = sz+'px';
      e.style.background = Math.random()>0.5 ? '#FF6B00' : '#FFCB8C';
      container.appendChild(e);
    }

    /* ── SCROLL REVEAL for cards ── */
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if(entry.isIntersecting){
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.12 });

    document.querySelectorAll('.staff-card').forEach(el => observer.observe(el));

    /* ── CUSTOM CURSOR ── */
    const dot  = document.getElementById('cur-dot');
    const ring = document.getElementById('cur-ring');
    let mx=0,my=0,rx=0,ry=0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      dot.style.left = mx+'px';
      dot.style.top  = my+'px';

      // spawn trail ember
      const t = document.createElement('div');
      t.className = 'cur-trail';
      const sz = 3 + Math.random()*5;
      t.style.cssText = `width:${sz}px;height:${sz}px;left:${mx}px;top:${my}px;background:${Math.random()>.5?'#FF6B00':'#FFCB8C'};`;
      document.body.appendChild(t);
      setTimeout(()=>t.remove(), 500);
    });

    // ring lags behind for smooth follow
    (function loopRing(){
      rx += (mx - rx) * 0.14;
      ry += (my - ry) * 0.14;
      ring.style.left = rx+'px';
      ring.style.top  = ry+'px';
      requestAnimationFrame(loopRing);
    })();

    // grow on interactive elements
    const hoverEls = document.querySelectorAll('a,button,.rank-card,.feature-card,.staff-card,.ip-box');
    hoverEls.forEach(el => {
      el.addEventListener('mouseenter', ()=>{
        dot.style.width  = '18px';
        dot.style.height = '18px';
        dot.style.background = '#FFCB8C';
        ring.style.width  = '48px';
        ring.style.height = '48px';
        ring.style.borderColor = 'rgba(255,203,140,0.8)';
      });
      el.addEventListener('mouseleave', ()=>{
        dot.style.width  = '12px';
        dot.style.height = '12px';
        dot.style.background = '#FF6B00';
        ring.style.width  = '32px';
        ring.style.height = '32px';
        ring.style.borderColor = 'rgba(255,107,0,0.6)';
      });
    });

    // click burst
    document.addEventListener('mousedown', ()=>{
      dot.style.transform = 'translate(-50%,-50%) scale(0.6)';
      ring.style.transform = 'translate(-50%,-50%) scale(1.5)';
      ring.style.opacity = '0.3';
    });
    document.addEventListener('mouseup', ()=>{
      dot.style.transform = 'translate(-50%,-50%) scale(1)';
      ring.style.transform = 'translate(-50%,-50%) scale(1)';
      ring.style.opacity = '1';
    });
  </script>

</body>
</html>
